name: daily
on:
  schedule:
    # Redundant same-UTC-day schedules: GitHub's scheduler dropped runs on 2026-07-05
    # and 2026-07-06. The pipeline is fully idempotent (eBay date guard, append-only
    # equities, deterministic rebuilds), so whichever fires first does the work and
    # any later one is a verified no-op — no duplicate data possible.
    - cron: "47 22 * * *"   # primary — after US close year-round
    - cron: "29 23 * * *"   # backup, 42 min later, still same UTC day
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: equities
        continue-on-error: true
        run: python -m collectors.equities
      - name: ebay prices
        continue-on-error: true
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -m collectors.ebay_prices
      - name: distributor telemetry
        continue-on-error: true
        env:
          MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_CLIENT_SECRET: ${{ secrets.DIGIKEY_CLIENT_SECRET }}
        run: python -m collectors.distributors
      - name: fred macro context
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m collectors.fred_series
      - name: sec facts
        continue-on-error: true
        env:
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
        run: python -m collectors.sec_facts
      - name: memory inc aggregate
        continue-on-error: true
        run: python -m engine.memory_inc
      - name: regime engine
        run: python -m engine.regime
      - name: volume + composite
        continue-on-error: true
        run: |
          python -m engine.volume
          python -m engine.composite
      - name: divergence flags
        continue-on-error: true
        run: python -m engine.divergence
      - name: notify
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m engine.notify
      - name: commit
        run: |
          git config user.name "tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet && echo "NO DATA CHANGES - check WARN lines in steps above" || git commit -m "daily data $(date -u +%F)"
          git push
