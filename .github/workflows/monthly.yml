name: monthly
on:
  schedule:
    - cron: "0 12 5 * *"    # 5th of month: prior-prior month is safely published (spec §3.4)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: census trade
        continue-on-error: true
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python -m collectors.census_trade
      - name: mccallum context (one-time)
        continue-on-error: true
        run: python -m collectors.mccallum
      - name: lead-lag stats
        continue-on-error: true
        run: python -m engine.stats
      - name: commit
        run: |
          git config user.name "tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet || git commit -m "monthly data $(date -u +%F)"
          git push
